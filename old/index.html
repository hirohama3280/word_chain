<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像しりとり</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #d6d6d6;
        }

        .container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            padding-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
        }

        /* カウンター用のスタイル */
        #image-counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
        }

        img {
            border: 2px solid #ccc;
            border-radius: 10px;
            margin-top: 20px;
            width: 300px;
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <!-- 
    ==================
    *No：1
    *担当者：多田
    *日付：2026-06-15
    *変更コメント：containerクラスの編集
    ==================
    -->
    <div class="container">
        <h1>【画像しりとり】</h1>
        <p id="image-counter">画像枚数: 計算中...</p>

        <section>
            <img src="img/start.jpg" alt="開始画像">
        </section>
        <section>
            <img src="" alt="">
        </section>
    </div>
    <!-- 
    ==================
    担当者：多田
    No.1END
    ==================
    -->

    <script>
        window.addEventListener('load', () => {
            const images = document.querySelectorAll('img');
            let validImageCount = 0;
            images.forEach(img => {
                // src属性が設定されており、かつ画像が正常に読み込まれているか（幅が0より大きいか）を判定
                const hasValidSrc = img.getAttribute('src') && img.getAttribute('src').trim() !== '';
                const isLoadedCorrectly = img.complete && img.naturalWidth > 0;

                if (hasValidSrc && isLoadedCorrectly) {
                    validImageCount++;
                }
            });

            // カウント結果を画面に反映
            const counterElement = document.getElementById('image-counter');
            counterElement.textContent = `画像枚数: ${validImageCount} 枚`;
        });
    </script>
</body>

</html>
